version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  send_reminder:
    docker:
      - image: cimg/node:20.9.0

    steps:
      - checkout
      - run:
          name: Install deps
          command: yarn install
      - run:
          name: Send reminder to Slack
          command: yarn send-reminder

  create_release_candidate:
    docker:
      - image: cimg/node:20.9.0

    steps:
      - checkout
      - run:
          name: Install deps
          command: yarn install
      - run:
          name: Create RC branch and PR in eigen
          command: ./scripts/create-release-candidate

  test-js:
    docker:
      - image: cimg/node:20.9.0
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: yarn install
      - run:
          name: Run tests
          command: yarn test

workflows:
  version: 2

  test:
    jobs:
      - test-js

  release_cadence:
    triggers:
      - schedule:
          cron: "0 10 * * 1,2,3,4,5" # https://crontab.guru
          filters:
            branches:
              only:
                - main
    jobs:
      - send_reminder

  create_rc:
    triggers:
      - schedule:
          cron: "0 8 * * 5" # Fridays at 08:00 UTC, 2 hours before QA reminder
          filters:
            branches:
              only:
                - main
    jobs:
      - create_release_candidate
  # # Uncomment the following workflow to trigger the reminder on every push, for debugging.
  # release_cadence_manual:
  #   jobs:
  #     - send_reminder
